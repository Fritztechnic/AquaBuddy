name: Build Windows Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: JDK 21 installieren
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: App-JAR bauen (ohne JavaFX)
        run: ./gradlew jar
        shell: bash

      - name: JavaFX 21 jmods herunterladen (fuer jlink)
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/21.0.5/openjfx-21.0.5_windows-x64_bin-jmods.zip" -o javafx-jmods.zip
          7z x javafx-jmods.zip -ojfx
        shell: cmd

      - name: Custom Runtime mit jlink erstellen
        run: |
          jlink ^
            --module-path "jfx\javafx-jmods-21.0.5;%JAVA_HOME%\jmods" ^
            --add-modules javafx.controls,javafx.fxml,javafx.media,javafx.web,java.base,java.desktop,java.logging,java.xml,java.naming,java.sql,java.management,jdk.unsupported ^
            --output runtime-image ^
            --strip-debug ^
            --no-header-files ^
            --no-man-pages
        shell: cmd

      - name: Windows-Installer mit jpackage erstellen
        run: |
          jpackage ^
            --type exe ^
            --name AquaBuddy ^
            --app-version 1.0.0 ^
            --input build\libs ^
            --main-jar WasserTrinkApp.jar ^
            --main-class com.waterreminder.Main ^
            --runtime-image runtime-image ^
            --java-options "--add-modules javafx.controls,javafx.fxml,javafx.media,javafx.web" ^
            --java-options "--enable-native-access=javafx.graphics,javafx.web" ^
            --win-dir-chooser ^
            --win-shortcut ^
            --win-menu ^
            --win-menu-group AquaBuddy ^
            --vendor AquaBuddy ^
            --dest build\jpackage
        shell: cmd

      - name: Installer hochladen als Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AquaBuddy-Windows-Installer
          path: build/jpackage/*.exe
          if-no-files-found: error
